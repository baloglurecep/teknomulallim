[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions.seed]
  included_files = ["public/site-data.json"]

[[redirects]]
  from = "/api/content"
  to = "/.netlify/functions/content"
  status = 200

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200

[[redirects]]
  from = "/api/media/sign"
  to = "/.netlify/functions/media-sign"
  status = 200

[[redirects]]
  from = "/api/seed"
  to = "/.netlify/functions/seed"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
